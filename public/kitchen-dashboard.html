<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hideout — Mutfak Ekrani</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1A2B;--navy-mid:#1a2d45;--navy-light:#243d5e;
  --gold:#C49A3C;--gold-dim:#8a6b28;--cream:#F2EDE4;
  --green:#2ecc71;--amber:#f39c12;--red:#e74c3c;
  --text-bright:#e8e0d0;--text-mid:#9a9080;
  --border:rgba(196,154,60,0.2);
}
html,body{height:100%;background:var(--navy);color:var(--text-bright);font-family:'Cormorant Garamond',serif;overflow-x:hidden}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;height:60px;background:var(--navy);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;gap:8px}
.header-logo{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--gold);letter-spacing:.15em;white-space:nowrap}
.header-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--text-mid)}
.header-center{display:flex;align-items:center;gap:8px;flex:1;justify-content:center;flex-wrap:wrap}
.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.live-indicator{display:flex;align-items:center;gap:6px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;color:var(--text-mid)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .3s;flex-shrink:0}
.live-dot.connected{background:var(--green);box-shadow:0 0 8px var(--green)}
.clock{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold)}

/* MUTE BUTTON */
.mute-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text-mid);padding:4px 10px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;cursor:pointer;transition:all .2s;white-space:nowrap}
.mute-btn:hover{border-color:var(--gold);color:var(--gold)}
.mute-btn.muted{background:rgba(231,76,60,.15);border-color:var(--red);color:var(--red)}

/* STATS BAR */
.stats-bar{position:fixed;top:60px;left:0;right:0;height:48px;background:var(--navy-mid);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:20px;z-index:99;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-item{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.stat-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.15em;color:var(--text-mid)}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--gold);font-weight:500}
.stat-divider{width:1px;height:24px;background:var(--border);flex-shrink:0}

/* CONTROLS BAR */
.controls-bar{position:fixed;top:108px;left:0;right:0;background:var(--navy);border-bottom:1px solid var(--border);display:flex;align-items:center;z-index:98;padding:0 16px;gap:6px;flex-wrap:wrap;min-height:44px}

/* STATUS TABS */
.tab-btn{display:flex;align-items:center;gap:5px;padding:10px 10px;background:none;border:none;border-bottom:2px solid transparent;font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;color:var(--text-mid);cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text-bright)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-count{background:var(--navy-light);color:var(--text-mid);font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center}
.tab-btn.active .tab-count{background:var(--gold-dim);color:var(--cream)}

/* SECTION FILTERS */
.section-filter{display:flex;gap:4px;margin-left:6px;padding-left:10px;border-left:1px solid var(--border)}
.sec-btn{padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:none;font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;color:var(--text-mid);cursor:pointer;transition:all .2s;white-space:nowrap}
.sec-btn:hover{border-color:var(--gold);color:var(--gold)}
.sec-btn.active{background:var(--navy-light);border-color:var(--gold);color:var(--gold)}

/* SORT & CLEAR */
.sort-btn{padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:none;font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;color:var(--text-mid);cursor:pointer;transition:all .2s;white-space:nowrap;margin-left:auto}
.sort-btn:hover{border-color:var(--gold);color:var(--gold)}
.clear-all-btn{padding:5px 10px;border:1px solid rgba(231,76,60,.3);border-radius:4px;background:rgba(231,76,60,.1);font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;color:var(--red);cursor:pointer;transition:all .2s;white-space:nowrap;display:none}
.clear-all-btn:hover{background:rgba(231,76,60,.2)}

/* MAIN */
.main{margin-top:152px;padding:16px;min-height:calc(100vh - 152px)}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* ORDER CARD */
.order-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s;animation:cardIn .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes cardIn{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.order-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.order-card.status-new{border-top:3px solid var(--gold)}
.order-card.status-preparing{border-top:3px solid var(--amber)}
.order-card.status-ready{border-top:3px solid var(--green);box-shadow:0 0 20px rgba(46,204,113,0.25);animation:readyPulse 2s ease-in-out infinite}
@keyframes readyPulse{0%,100%{box-shadow:0 0 10px rgba(46,204,113,0.2)}50%{box-shadow:0 0 30px rgba(46,204,113,0.5)}}

.card-header{padding:12px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border)}
.card-order-num{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;color:var(--gold);line-height:1}
.card-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.card-table{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;color:var(--text-bright)}
.card-time{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-mid)}
.card-elapsed{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--amber)}
.card-elapsed.urgent{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.card-body{padding:10px 14px}
.card-customer{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--text-mid);margin-bottom:8px}
.card-items{list-style:none}
.card-item{display:flex;align-items:baseline;padding:4px 0;border-bottom:1px solid rgba(196,154,60,.07);gap:8px}
.card-item:last-child{border-bottom:none}
.item-qty{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--gold);flex-shrink:0;min-width:22px}
.item-name{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text-bright);flex:1;line-height:1.3}
.item-note-inline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:10px;color:var(--gold-dim);display:block;margin-top:1px}
.card-order-note{margin-top:8px;padding:6px 8px;background:rgba(196,154,60,.07);border-left:2px solid var(--gold-dim);border-radius:0 4px 4px 0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:var(--text-mid)}

/* SECTION BADGE on card */
.card-section-badge{display:inline-block;font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;padding:2px 6px;border-radius:3px;margin-bottom:4px}
.badge-kitchen{background:rgba(196,154,60,.15);color:var(--gold)}
.badge-bar{background:rgba(46,204,113,.15);color:var(--green)}

.card-footer{padding:8px 14px 12px;display:flex;gap:6px;border-top:1px solid var(--border)}
.action-btn{flex:1;padding:7px 4px;border:none;border-radius:6px;font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;cursor:pointer;transition:all .15s}
.btn-preparing{background:rgba(243,156,18,.15);color:var(--amber);border:1px solid rgba(243,156,18,.3)}
.btn-preparing:hover{background:rgba(243,156,18,.25)}
.btn-ready{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.btn-ready:hover{background:rgba(46,204,113,.25)}
.btn-done{background:rgba(196,154,60,.15);color:var(--gold);border:1px solid rgba(196,154,60,.3)}
.btn-done:hover{background:rgba(196,154,60,.25)}
.btn-delete{flex:0 0 auto;width:30px;padding:7px;background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.btn-delete:hover{background:rgba(231,76,60,.2)}

.status-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Cinzel',serif;font-size:7px;letter-spacing:.1em;padding:2px 7px;border-radius:3px;margin-bottom:4px}
.badge-new{background:rgba(196,154,60,.15);color:var(--gold)}
.badge-preparing{background:rgba(243,156,18,.15);color:var(--amber)}
.badge-ready{background:rgba(46,204,113,.15);color:var(--green)}
.status-dot{width:4px;height:4px;border-radius:50%;background:currentColor}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:10px}
.empty-icon{font-size:44px;opacity:.35}
.empty-text{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.15em;color:var(--text-mid)}

/* TOAST */
.toast-container{position:fixed;top:68px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--navy-mid);border:1px solid var(--gold);border-left:3px solid var(--gold);border-radius:8px;padding:10px 14px;min-width:220px;animation:toastIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--gold);margin-bottom:2px}
.toast-body{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--text-bright)}

.conn-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--red);color:white;text-align:center;padding:8px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.1em;z-index:300}
.conn-banner.show{display:block}

@media(max-width:480px){
  .header-logo{font-size:13px}
  .stat-item:nth-child(n+8){display:none}
  .orders-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-logo">HIDEOUT</div>
    <div class="header-sub">Mutfak</div>
  </div>
  <div class="header-center">
    <div class="live-indicator">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveText">BAGLAN IYOR</span>
    </div>
  </div>
  <div class="header-right">
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔔 SES</button>
    <div class="clock" id="clock">--:--</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-label">TOPLAM</div><div class="stat-value" id="statTotal">0</div></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><div class="stat-label">AKTIF</div><div class="stat-value" id="statActive">0</div></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><div class="stat-label">HAZIRLANIYOR</div><div class="stat-value" id="statPreparing">0</div></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><div class="stat-label">HAZIR</div><div class="stat-value" id="statReady">0</div></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><div class="stat-label">CIRO</div><div class="stat-value" id="statRevenue">0 TL</div></div>
</div>

<div class="controls-bar">
  <button class="tab-btn active" onclick="setTab('all',this)">TUMU <span class="tab-count" id="countAll">0</span></button>
  <button class="tab-btn" onclick="setTab('new',this)">YENI <span class="tab-count" id="countNew">0</span></button>
  <button class="tab-btn" onclick="setTab('preparing',this)">HAZIRLANIYOR <span class="tab-count" id="countPreparing">0</span></button>
  <button class="tab-btn" onclick="setTab('ready',this)">HAZIR <span class="tab-count" id="countReady">0</span></button>
  <button class="tab-btn" onclick="setTab('done',this)">TAMAMLANDI <span class="tab-count" id="countDone">0</span></button>

  <div class="section-filter">
    <button class="sec-btn active" onclick="setSection('all',this)">TUMU</button>
    <button class="sec-btn" onclick="setSection('kitchen',this)">MUTFAK</button>
    <button class="sec-btn" onclick="setSection('bar',this)">BAR</button>
  </div>

  <button class="sort-btn" id="sortBtn" onclick="toggleSort()">⬆ ESKIDEN YENIYE</button>
  <button class="clear-all-btn" id="clearAllBtn" onclick="clearAllDone()">TUMUNU TEMIZLE</button>
</div>

<main class="main">
  <div class="orders-grid" id="ordersGrid"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🍽</div>
    <div class="empty-text">SIPARIS BEKLENIYOR...</div>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>
<div class="conn-banner" id="connBanner">BAGLANTI KESILDI - YENIDEN BAGLAN IYOR...</div>

<script src="/socket.io/socket.io.js"></script>
<script>
var BACKEND_URL = 'https://hideout-kitchen.onrender.com';

var orders = [];
var activeTab = 'all';
var activeSection = 'all';
var sortOldFirst = true;
var muted = false;
var socket = null;

// ── CLOCK ─────────────────────────────────────────────────────────────────
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
}
setInterval(updateClock, 1000);
updateClock();

// ── ELAPSED ───────────────────────────────────────────────────────────────
function getElapsed(at) {
  var diff = Math.floor((Date.now() - at) / 1000);
  if (diff < 60) return diff + 'sn';
  return Math.floor(diff/60) + 'dk ' + String(diff%60).padStart(2,'0') + 'sn';
}
function isUrgent(at) { return (Date.now() - at) > 15 * 60 * 1000; }
function isDelayed(at) { return (Date.now() - at) > 20 * 60 * 1000; }

setInterval(function() {
  var els = document.querySelectorAll('.card-elapsed');
  for (var i = 0; i < els.length; i++) {
    var at = parseInt(els[i].getAttribute('data-at'));
    els[i].textContent = getElapsed(at);
    if (isUrgent(at)) els[i].classList.add('urgent');
    else els[i].classList.remove('urgent');
  }
}, 1000);

// ── MUTE ──────────────────────────────────────────────────────────────────
function toggleMute() {
  muted = !muted;
  var btn = document.getElementById('muteBtn');
  btn.textContent = muted ? '🔇 SESSIZE AL' : '🔔 SES';
  btn.classList.toggle('muted', muted);
}

// ── SORT ──────────────────────────────────────────────────────────────────
function toggleSort() {
  sortOldFirst = !sortOldFirst;
  document.getElementById('sortBtn').textContent = sortOldFirst ? '⬆ ESKIDEN YENIYE' : '⬇ YENIDEN ESKIYE';
  renderAll();
}

// ── SECTION FILTER ────────────────────────────────────────────────────────
function setSection(sec, btn) {
  activeSection = sec;
  var btns = document.querySelectorAll('.sec-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  renderAll();
}

// Detect if order is bar or kitchen based on items
function getOrderSection(order) {
  var barKeywords = ['kokteyl','bira','sarap','viski','votka','cin','rom','tekila','aperol','campari','martini','mojito','espresso martini','negroni','long island','cuba libre','pornstar','caipirinha','manhattan','whiskey sour','bloody mary','lynchburg','spritz','prosecco','moet','champagne','gin','rum','bourbon','spirits','likör','mürver','cola','fanta','sprite','schweppes','red bull','maden suyu','san pellegrino','tonic','portakal suyu','fuse tea','americano','latte','cappuccino','filtre','türk kahvesi','çay'];
  for (var i = 0; i < order.items.length; i++) {
    var name = order.items[i].name.toLowerCase();
    for (var j = 0; j < barKeywords.length; j++) {
      if (name.indexOf(barKeywords[j]) !== -1) return 'bar';
    }
  }
  return 'kitchen';
}

// ── CONNECT ───────────────────────────────────────────────────────────────
function markConnected() {
  document.getElementById('liveDot').classList.add('connected');
  document.getElementById('liveText').textContent = 'CANLI';
  document.getElementById('connBanner').classList.remove('show');
}

function initSocket() {
  socket = io({ transports: ['polling'] });

  socket.on('connect', function() { markConnected(); });
  socket.on('connect_error', function() { markConnected(); });

  socket.on('init_orders', function(data) {
    markConnected();
    orders = data;
    renderAll();
    updateStats();
  });

  socket.on('new_order', function(order) {
    var exists = false;
    for (var i = 0; i < orders.length; i++) {
      if (orders[i].id === order.id) { exists = true; break; }
    }
    if (!exists) {
      orders.push(order);
      renderAll();
      updateStats();
      if (!muted) playAlert('new');
      showToast(order);
    }
  });

  socket.on('order_updated', function(data) {
    for (var i = 0; i < orders.length; i++) {
      if (orders[i].id === data.id) {
        orders[i].status = data.status;
        if (data.status === 'ready' && !muted) playAlert('ready');
        break;
      }
    }
    renderAll();
    updateStats();
  });

  socket.on('order_removed', function(data) {
    var next = [];
    for (var i = 0; i < orders.length; i++) {
      if (orders[i].id !== data.id) next.push(orders[i]);
    }
    orders = next;
    renderAll();
    updateStats();
  });

  socket.on('disconnect', function() {
    document.getElementById('liveDot').classList.remove('connected');
    document.getElementById('liveText').textContent = 'BAGLANTI KESILDI';
    document.getElementById('connBanner').classList.add('show');
  });
}

window.addEventListener('load', function() { initSocket(); });

// ── TABS ──────────────────────────────────────────────────────────────────
function setTab(tab, btn) {
  activeTab = tab;
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  document.getElementById('clearAllBtn').style.display = tab === 'done' ? 'block' : 'none';
  renderAll();
}

function clearAllDone() {
  if (!confirm('Tum tamamlanan siparisleri silmek istediginizden emin misiniz?')) return;
  for (var i = 0; i < orders.length; i++) {
    if (orders[i].status === 'done') {
      fetch(BACKEND_URL + '/order/' + orders[i].id, { method: 'DELETE' });
    }
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────
function statusLabel(s) {
  if (s === 'new') return 'YENI SIPARIS';
  if (s === 'preparing') return 'HAZIRLANIYOR';
  if (s === 'ready') return 'HAZIR';
  if (s === 'done') return 'TAMAMLANDI';
  return s;
}

function renderAll() {
  var grid = document.getElementById('ordersGrid');
  var empty = document.getElementById('emptyState');

  var filtered = [];
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    var tabMatch = (activeTab === 'all' && o.status !== 'done') || activeTab === o.status;
    var secMatch = activeSection === 'all' || getOrderSection(o) === activeSection;
    if (tabMatch && secMatch) filtered.push(o);
  }

  filtered.sort(function(a,b) {
    var rank = ['new','preparing','ready','done'];
    var d = rank.indexOf(a.status) - rank.indexOf(b.status);
    if (d !== 0) return d;
    return sortOldFirst ? a.receivedAt - b.receivedAt : b.receivedAt - a.receivedAt;
  });

  var counts = {new:0,preparing:0,ready:0,done:0};
  for (var i = 0; i < orders.length; i++) {
    if (counts[orders[i].status] !== undefined) counts[orders[i].status]++;
  }
  var allActive = 0;
  for (var i = 0; i < orders.length; i++) {
    if (orders[i].status !== 'done') allActive++;
  }

  document.getElementById('countAll').textContent = allActive;
  document.getElementById('countNew').textContent = counts.new;
  document.getElementById('countPreparing').textContent = counts.preparing;
  document.getElementById('countReady').textContent = counts.ready;
  document.getElementById('countDone').textContent = counts.done;

  while (grid.firstChild) grid.removeChild(grid.firstChild);

  if (filtered.length === 0) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  for (var i = 0; i < filtered.length; i++) {
    grid.appendChild(buildCard(filtered[i]));
  }
}

function buildCard(order) {
  var sec = getOrderSection(order);
  var card = document.createElement('div');
  card.className = 'order-card status-' + order.status;

  var hdr = document.createElement('div');
  hdr.className = 'card-header';

  var left = document.createElement('div');

  var secBadge = document.createElement('div');
  secBadge.className = 'card-section-badge badge-' + sec;
  secBadge.textContent = sec === 'bar' ? 'BAR' : 'MUTFAK';
  left.appendChild(secBadge);

  var badge = document.createElement('div');
  badge.className = 'status-badge badge-' + order.status;
  var dot = document.createElement('span');
  dot.className = 'status-dot';
  badge.appendChild(dot);
  badge.appendChild(document.createTextNode(' ' + statusLabel(order.status)));
  left.appendChild(badge);

  var num = document.createElement('div');
  num.className = 'card-order-num';
  num.textContent = '#' + String(order.id).padStart(3,'0');
  left.appendChild(num);

  var right = document.createElement('div');
  right.className = 'card-meta';
  var tbl = document.createElement('div');
  tbl.className = 'card-table';
  tbl.textContent = order.orderType === 'dinein' ? 'MASA ' + order.table : 'PAKET SERVIS';
  right.appendChild(tbl);
  var tim = document.createElement('div');
  tim.className = 'card-time';
  tim.textContent = order.timestamp;
  right.appendChild(tim);
  var ela = document.createElement('div');
  ela.className = 'card-elapsed' + (isUrgent(order.receivedAt) ? ' urgent' : '');
  ela.setAttribute('data-at', String(order.receivedAt));
  ela.textContent = getElapsed(order.receivedAt);
  right.appendChild(ela);

  hdr.appendChild(left);
  hdr.appendChild(right);
  card.appendChild(hdr);

  var body = document.createElement('div');
  body.className = 'card-body';
  var cust = document.createElement('div');
  cust.className = 'card-customer';
  cust.textContent = order.name;
  body.appendChild(cust);

  var list = document.createElement('ul');
  list.className = 'card-items';
  for (var i = 0; i < order.items.length; i++) {
    var item = order.items[i];
    var li = document.createElement('li');
    li.className = 'card-item';
    var qty = document.createElement('span');
    qty.className = 'item-qty';
    qty.textContent = item.qty + 'x';
    var nw = document.createElement('div');
    nw.style.flex = '1';
    var iname = document.createElement('span');
    iname.className = 'item-name';
    iname.textContent = item.name;
    nw.appendChild(iname);
    if (item.note) {
      var inote = document.createElement('span');
      inote.className = 'item-note-inline';
      inote.textContent = item.note;
      nw.appendChild(inote);
    }
    li.appendChild(qty);
    li.appendChild(nw);
    list.appendChild(li);
  }
  body.appendChild(list);

  if (order.note) {
    var onote = document.createElement('div');
    onote.className = 'card-order-note';
    onote.textContent = 'Not: ' + order.note;
    body.appendChild(onote);
  }
  card.appendChild(body);

  var foot = document.createElement('div');
  foot.className = 'card-footer';

  function makeBtn(cls, label, id, status) {
    var b = document.createElement('button');
    b.className = 'action-btn ' + cls;
    b.textContent = label;
    b.setAttribute('data-id', String(id));
    b.addEventListener('click', function() {
      updateStatus(parseInt(this.getAttribute('data-id')), status);
    });
    return b;
  }

  if (order.status === 'new') foot.appendChild(makeBtn('btn-preparing','HAZIRLANIYOR',order.id,'preparing'));
  if (order.status === 'preparing') foot.appendChild(makeBtn('btn-ready','HAZIR',order.id,'ready'));
  if (order.status === 'ready') foot.appendChild(makeBtn('btn-done','SERVIS EDILDI',order.id,'done'));
  if (order.status === 'done') {
    var rb = document.createElement('button');
    rb.className = 'action-btn btn-done';
    rb.textContent = 'KALDIR';
    rb.setAttribute('data-id', String(order.id));
    rb.addEventListener('click', function() { deleteOrder(parseInt(this.getAttribute('data-id'))); });
    foot.appendChild(rb);
  }

  if (order.status !== 'done') {
    var db = document.createElement('button');
    db.className = 'action-btn btn-delete';
    db.textContent = 'X';
    db.setAttribute('data-id', String(order.id));
    db.addEventListener('click', function() {
      if (confirm('Siparisi silmek istediginizden emin misiniz?')) {
        deleteOrder(parseInt(this.getAttribute('data-id')));
      }
    });
    foot.appendChild(db);
  }

  card.appendChild(foot);
  return card;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function updateStatus(id, status) {
  fetch(BACKEND_URL + '/order/' + id + '/status', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({status: status})
  });
}

function deleteOrder(id) {
  fetch(BACKEND_URL + '/order/' + id, {method:'DELETE'});
}

// ── STATS ─────────────────────────────────────────────────────────────────
function updateStats() {
  var active = 0, preparing = 0, ready = 0, revenue = 0;
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    if (o.status !== 'done') active++;
    if (o.status === 'preparing') preparing++;
    if (o.status === 'ready') ready++;
    for (var j = 0; j < o.items.length; j++) {
      revenue += o.items[j].price * o.items[j].qty;
    }
  }
  document.getElementById('statTotal').textContent = orders.length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statPreparing').textContent = preparing;
  document.getElementById('statReady').textContent = ready;
  document.getElementById('statRevenue').textContent = revenue.toLocaleString('tr-TR') + ' TL';
}

// ── SOUND ─────────────────────────────────────────────────────────────────
function playAlert(type) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, start, dur, vol) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(vol || 0.3, ctx.currentTime + start + 0.01);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    }
    if (type === 'new') {
      beep(880, 0, 0.12);
      beep(1100, 0.15, 0.12);
      beep(1320, 0.30, 0.20);
    } else if (type === 'ready') {
      // Different tone for ready - higher pitched double beep
      beep(1500, 0, 0.08, 0.4);
      beep(1800, 0.12, 0.08, 0.4);
      beep(1500, 0.24, 0.08, 0.4);
      beep(1800, 0.36, 0.15, 0.4);
    } else if (type === 'delayed') {
      // Low urgent tone for delayed orders
      beep(300, 0, 0.3, 0.5);
      beep(250, 0.4, 0.3, 0.5);
    }
  } catch(e) {}
}

// ── DELAYED ORDER ALERT ───────────────────────────────────────────────────
setInterval(function() {
  if (muted) return;
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    if ((o.status === 'new' || o.status === 'preparing') && isDelayed(o.receivedAt)) {
      playAlert('delayed');
      break;
    }
  }
}, 5 * 60 * 1000); // Check every 5 minutes

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(order) {
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast';
  var title = document.createElement('div');
  title.className = 'toast-title';
  title.textContent = 'YENI SIPARIS #' + String(order.id).padStart(3,'0');
  toast.appendChild(title);
  var body = document.createElement('div');
  body.className = 'toast-body';
  var loc = order.orderType === 'dinein' ? 'Masa ' + order.table : 'Paket Servis';
  body.textContent = loc + ' - ' + order.items.length + ' kalem';
  toast.appendChild(body);
  container.appendChild(toast);
  setTimeout(function() {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
  }, 5000);
}
