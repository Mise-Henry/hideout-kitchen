<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hideout — Mutfak Ekrani</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0F1A2B;--navy-mid:#1a2d45;--navy-light:#243d5e;
  --gold:#C49A3C;--gold-dim:#8a6b28;--cream:#F2EDE4;
  --green:#2ecc71;--amber:#f39c12;--red:#e74c3c;
  --text-bright:#e8e0d0;--text-mid:#9a9080;
  --border:rgba(196,154,60,0.2);
}
html,body{height:100%;background:var(--navy);color:var(--text-bright);font-family:'Cormorant Garamond',serif;overflow-x:hidden}
.header{position:fixed;top:0;left:0;right:0;height:60px;background:var(--navy);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.header-logo{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.15em}
.header-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--text-mid)}
.header-right{display:flex;align-items:center;gap:20px}
.live-indicator{display:flex;align-items:center;gap:7px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;color:var(--text-mid)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .3s}
.live-dot.connected{background:var(--green);box-shadow:0 0 8px var(--green)}
.live-dot.demo{background:var(--amber);box-shadow:0 0 8px var(--amber)}
.clock{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--gold);letter-spacing:.05em}
.stats-bar{position:fixed;top:60px;left:0;right:0;height:52px;background:var(--navy-mid);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:32px;z-index:99}
.stat-item{display:flex;flex-direction:column;gap:1px}
.stat-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;color:var(--text-mid)}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--gold);font-weight:500}
.stat-divider{width:1px;height:28px;background:var(--border)}
.tabs{position:fixed;top:112px;left:0;right:0;height:44px;background:var(--navy);border-bottom:1px solid var(--border);display:flex;align-items:stretch;z-index:98;padding:0 24px;gap:4px}
.tab-btn{display:flex;align-items:center;gap:7px;padding:0 16px;background:none;border:none;border-bottom:2px solid transparent;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;color:var(--text-mid);cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--text-bright)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-count{background:var(--navy-light);color:var(--text-mid);font-family:'JetBrains Mono',monospace;font-size:10px;padding:1px 6px;border-radius:10px;min-width:20px;text-align:center;transition:all .2s}
.tab-btn.active .tab-count{background:var(--gold-dim);color:var(--cream)}
.main{margin-top:156px;padding:20px 24px 40px;min-height:calc(100vh - 156px)}
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.order-card{background:var(--navy-mid);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s;animation:cardIn .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes cardIn{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.order-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.order-card.status-new{border-top:3px solid var(--gold)}
.order-card.status-preparing{border-top:3px solid var(--amber)}
.order-card.status-ready{border-top:3px solid var(--green)}
.card-header{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border)}
.card-order-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:var(--gold);line-height:1}
.card-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.card-table{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.1em;color:var(--text-bright)}
.card-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-mid)}
.card-elapsed{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber)}
.card-elapsed.urgent{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.card-body{padding:12px 16px}
.card-customer{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--text-mid);margin-bottom:10px}
.card-items{list-style:none}
.card-item{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid rgba(196,154,60,.08);gap:8px}
.card-item:last-child{border-bottom:none}
.item-qty{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--gold);flex-shrink:0;min-width:24px}
.item-name{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text-bright);flex:1;line-height:1.3}
.item-note-inline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;color:var(--gold-dim);display:block;margin-top:2px}
.card-order-note{margin-top:10px;padding:8px 10px;background:rgba(196,154,60,.07);border-left:2px solid var(--gold-dim);border-radius:0 6px 6px 0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--text-mid)}
.card-footer{padding:10px 16px 14px;display:flex;gap:8px;border-top:1px solid var(--border)}
.action-btn{flex:1;padding:8px 4px;border:none;border-radius:6px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;cursor:pointer;transition:all .15s}
.btn-preparing{background:rgba(243,156,18,.15);color:var(--amber);border:1px solid rgba(243,156,18,.3)}
.btn-preparing:hover{background:rgba(243,156,18,.25)}
.btn-ready{background:rgba(46,204,113,.15);color:var(--green);border:1px solid rgba(46,204,113,.3)}
.btn-ready:hover{background:rgba(46,204,113,.25)}
.btn-done{background:rgba(196,154,60,.15);color:var(--gold);border:1px solid rgba(196,154,60,.3)}
.btn-done:hover{background:rgba(196,154,60,.25)}
.btn-delete{flex:0 0 auto;width:32px;padding:8px;background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.btn-delete:hover{background:rgba(231,76,60,.2)}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:.12em;padding:3px 8px;border-radius:3px;margin-bottom:6px}
.badge-new{background:rgba(196,154,60,.15);color:var(--gold)}
.badge-preparing{background:rgba(243,156,18,.15);color:var(--amber)}
.badge-ready{background:rgba(46,204,113,.15);color:var(--green)}
.status-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;color:var(--text-mid)}
.empty-icon{font-size:48px;opacity:.4}
.empty-text{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.15em;color:var(--text-mid)}
.toast-container{position:fixed;top:72px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--navy-mid);border:1px solid var(--gold);border-left:3px solid var(--gold);border-radius:8px;padding:12px 16px;min-width:260px;animation:toastIn .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;color:var(--gold);margin-bottom:3px}
.toast-body{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text-bright)}
.conn-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--red);color:white;text-align:center;padding:10px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;z-index:300}
.conn-banner.show{display:block}
.demo-banner{position:fixed;bottom:0;left:0;right:0;background:var(--amber);color:var(--navy);text-align:center;padding:8px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.12em;z-index:300;display:none}
.demo-banner.show{display:block}
@media(max-width:600px){.header{padding:0 14px}.stats-bar{padding:0 14px;gap:18px}.tabs{padding:0 14px}.main{padding:16px 14px 40px}.orders-grid{grid-template-columns:1fr}.stat-item:nth-child(n+4){display:none}}
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-logo">HIDEOUT</div>
    <div class="header-sub">Mutfak Ekrani</div>
  </div>
  <div class="header-right">
    <div class="live-indicator">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveText">BAGLAN IYOR...</span>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-label">TOPLAM SIPARIS</div>
    <div class="stat-value" id="statTotal">0</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-label">AKTIF</div>
    <div class="stat-value" id="statActive">0</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-label">HAZIRLANIYOR</div>
    <div class="stat-value" id="statPreparing">0</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-label">HAZIR</div>
    <div class="stat-value" id="statReady">0</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-label">GUNLUK CIRO</div>
    <div class="stat-value" id="statRevenue">0 TL</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="setTab('all',this)">TUMÜ <span class="tab-count" id="countAll">0</span></button>
  <button class="tab-btn" onclick="setTab('new',this)">YENI <span class="tab-count" id="countNew">0</span></button>
  <button class="tab-btn" onclick="setTab('preparing',this)">HAZIRLANIYOR <span class="tab-count" id="countPreparing">0</span></button>
  <button class="tab-btn" onclick="setTab('ready',this)">HAZIR <span class="tab-count" id="countReady">0</span></button>
  <button class="tab-btn" onclick="setTab('done',this)">TAMAMLANDI <span class="tab-count" id="countDone">0</span></button>
</div>

<main class="main">
  <div class="orders-grid" id="ordersGrid"></div>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🍽</div>
    <div class="empty-text">SIPARIS BEKLENIYOR...</div>
  </div>
</main>

<div class="toast-container" id="toastContainer"></div>
<div class="conn-banner" id="connBanner">SUNUCU BAGLANTISI KESILDI - YENIDEN BAGLAN IYOR...</div>
<div class="demo-banner" id="demoBanner">DEMO MOD - Render'a deploy ettikten sonra BACKEND_URL'yi guncelleyin</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ================================================================
// HIDEOUT MUTFAK EKRANI
// Deploy sonrasi bu satiri guncelleyin:
var BACKEND_URL = 'https://hideout-kitchen.onrender.com';
// Ornek: var BACKEND_URL = 'https://hideout-kitchen.onrender.com';
// ================================================================

var orders = [];
var activeTab = 'all';
var socket = null;

// ── CLOCK ────────────────────────────────────────────────────────
function updateClock() {
  var now = new Date();
  var h = String(now.getHours()).padStart(2,'0');
  var m = String(now.getMinutes()).padStart(2,'0');
  var s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
}
setInterval(updateClock, 1000);
updateClock();

// ── ELAPSED ──────────────────────────────────────────────────────
function getElapsed(at) {
  var diff = Math.floor((Date.now() - at) / 1000);
  if (diff < 60) return diff + 'sn';
  return Math.floor(diff/60) + 'dk ' + String(diff%60).padStart(2,'0') + 'sn';
}

function isUrgent(at) {
  return (Date.now() - at) > 15 * 60 * 1000;
}

setInterval(function() {
  var els = document.querySelectorAll('.card-elapsed');
  for (var i = 0; i < els.length; i++) {
    var at = parseInt(els[i].getAttribute('data-at'));
    els[i].textContent = getElapsed(at);
    if (isUrgent(at)) { els[i].classList.add('urgent'); }
    else { els[i].classList.remove('urgent'); }
  }
}, 1000);

// ── CONNECT ──────────────────────────────────────────────────────
function initSocket() {
  if (!BACKEND_URL) {
    document.getElementById('liveDot').className = 'live-dot demo';
    document.getElementById('liveText').textContent = 'DEMO MOD';
    document.getElementById('demoBanner').classList.add('show');
    return;
  }

  socket = io({ transports: ['polling'] });

  socket.on('connect', function() {
    document.getElementById('liveDot').classList.add('connected');
    document.getElementById('liveText').textContent = 'CANLI';
    document.getElementById('connBanner').classList.remove('show');
  });

  socket.on('connect_error', function() {
    // Still receiving via polling — mark as connected anyway
    document.getElementById('liveDot').classList.add('connected');
    document.getElementById('liveText').textContent = 'CANLI';
  });

  socket.on('init_orders', function(data) {
    document.getElementById('liveDot').classList.add('connected');
    document.getElementById('liveText').textContent = 'CANLI';
    orders = data;
    renderAll();
    updateStats();
  });

  socket.on('new_order', function(order) {
    // Prevent duplicates
    var exists = false;
    for (var i = 0; i < orders.length; i++) {
      if (orders[i].id === order.id) { exists = true; break; }
    }
    if (!exists) {
      orders.push(order);
      renderAll();
      updateStats();
      playAlert();
      showToast(order);
    }
  });

  socket.on('order_updated', function(data) {
    for (var i = 0; i < orders.length; i++) {
      if (orders[i].id === data.id) { orders[i].status = data.status; break; }
    }
    renderAll();
    updateStats();
  });

  socket.on('order_removed', function(data) {
    var next = [];
    for (var i = 0; i < orders.length; i++) {
      if (orders[i].id !== data.id) next.push(orders[i]);
    }
    orders = next;
    renderAll();
    updateStats();
  });
}

// Wait for Socket.io CDN to load
window.addEventListener('load', function() {
  initSocket();
});

// ── TABS ─────────────────────────────────────────────────────────
function setTab(tab, btn) {
  activeTab = tab;
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  renderAll();
}

// ── RENDER ───────────────────────────────────────────────────────
function statusLabel(s) {
  if (s === 'new') return 'YENI SIPARIS';
  if (s === 'preparing') return 'HAZIRLANIYOR';
  if (s === 'ready') return 'HAZIR';
  if (s === 'done') return 'TAMAMLANDI';
  return s;
}

function renderAll() {
  var grid = document.getElementById('ordersGrid');
  var empty = document.getElementById('emptyState');

  var filtered = [];
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    if (activeTab === 'all' && o.status !== 'done') filtered.push(o);
    else if (activeTab === o.status) filtered.push(o);
  }

  filtered.sort(function(a,b) {
    var rank = ['new','preparing','ready','done'];
    var d = rank.indexOf(a.status) - rank.indexOf(b.status);
    return d !== 0 ? d : a.receivedAt - b.receivedAt;
  });

  var counts = {new:0,preparing:0,ready:0,done:0};
  for (var i = 0; i < orders.length; i++) {
    if (counts[orders[i].status] !== undefined) counts[orders[i].status]++;
  }
  var allActive = 0;
  for (var i = 0; i < orders.length; i++) {
    if (orders[i].status !== 'done') allActive++;
  }

  document.getElementById('countAll').textContent = allActive;
  document.getElementById('countNew').textContent = counts.new;
  document.getElementById('countPreparing').textContent = counts.preparing;
  document.getElementById('countReady').textContent = counts.ready;
  document.getElementById('countDone').textContent = counts.done;

  while (grid.firstChild) grid.removeChild(grid.firstChild);

  if (filtered.length === 0) { empty.style.display = 'flex'; return; }
  empty.style.display = 'none';

  for (var i = 0; i < filtered.length; i++) {
    grid.appendChild(buildCard(filtered[i]));
  }
}

function buildCard(order) {
  var card = document.createElement('div');
  card.className = 'order-card status-' + order.status;

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'card-header';

  var left = document.createElement('div');
  var badge = document.createElement('div');
  badge.className = 'status-badge badge-' + order.status;
  var dot = document.createElement('span');
  dot.className = 'status-dot';
  badge.appendChild(dot);
  badge.appendChild(document.createTextNode(' ' + statusLabel(order.status)));
  left.appendChild(badge);
  var num = document.createElement('div');
  num.className = 'card-order-num';
  num.textContent = '#' + String(order.id).padStart(3,'0');
  left.appendChild(num);

  var right = document.createElement('div');
  right.className = 'card-meta';
  var tbl = document.createElement('div');
  tbl.className = 'card-table';
  tbl.textContent = order.orderType === 'dinein' ? 'MASA ' + order.table : 'PAKET SERVIS';
  right.appendChild(tbl);
  var tim = document.createElement('div');
  tim.className = 'card-time';
  tim.textContent = order.timestamp;
  right.appendChild(tim);
  var ela = document.createElement('div');
  ela.className = 'card-elapsed' + (isUrgent(order.receivedAt) ? ' urgent' : '');
  ela.setAttribute('data-at', String(order.receivedAt));
  ela.textContent = getElapsed(order.receivedAt);
  right.appendChild(ela);

  hdr.appendChild(left);
  hdr.appendChild(right);
  card.appendChild(hdr);

  // Body
  var body = document.createElement('div');
  body.className = 'card-body';
  var cust = document.createElement('div');
  cust.className = 'card-customer';
  cust.textContent = order.name;
  body.appendChild(cust);

  var list = document.createElement('ul');
  list.className = 'card-items';
  for (var i = 0; i < order.items.length; i++) {
    var item = order.items[i];
    var li = document.createElement('li');
    li.className = 'card-item';
    var qty = document.createElement('span');
    qty.className = 'item-qty';
    qty.textContent = item.qty + 'x';
    var nw = document.createElement('div');
    nw.style.flex = '1';
    var iname = document.createElement('span');
    iname.className = 'item-name';
    iname.textContent = item.name;
    nw.appendChild(iname);
    if (item.note) {
      var inote = document.createElement('span');
      inote.className = 'item-note-inline';
      inote.textContent = item.note;
      nw.appendChild(inote);
    }
    li.appendChild(qty);
    li.appendChild(nw);
    list.appendChild(li);
  }
  body.appendChild(list);

  if (order.note) {
    var onote = document.createElement('div');
    onote.className = 'card-order-note';
    onote.textContent = 'Not: ' + order.note;
    body.appendChild(onote);
  }
  card.appendChild(body);

  // Footer
  var foot = document.createElement('div');
  foot.className = 'card-footer';

  function makeBtn(cls, label, id, status) {
    var b = document.createElement('button');
    b.className = 'action-btn ' + cls;
    b.textContent = label;
    b.setAttribute('data-id', String(id));
    b.addEventListener('click', function() {
      updateStatus(parseInt(this.getAttribute('data-id')), status);
    });
    return b;
  }

  if (order.status === 'new') foot.appendChild(makeBtn('btn-preparing','HAZIRLANIYOR',order.id,'preparing'));
  if (order.status === 'preparing') foot.appendChild(makeBtn('btn-ready','HAZIR',order.id,'ready'));
  if (order.status === 'ready') foot.appendChild(makeBtn('btn-done','SERVIS EDILDI',order.id,'done'));
  if (order.status === 'done') {
    var rb = document.createElement('button');
    rb.className = 'action-btn btn-done';
    rb.textContent = 'KALDIR';
    rb.setAttribute('data-id', String(order.id));
    rb.addEventListener('click', function() { deleteOrder(parseInt(this.getAttribute('data-id'))); });
    foot.appendChild(rb);
  }

  if (order.status !== 'done') {
    var db = document.createElement('button');
    db.className = 'action-btn btn-delete';
    db.textContent = 'X';
    db.setAttribute('data-id', String(order.id));
    db.addEventListener('click', function() {
      if (confirm('Siparisi silmek istediginizden emin misiniz?')) {
        deleteOrder(parseInt(this.getAttribute('data-id')));
      }
    });
    foot.appendChild(db);
  }

  card.appendChild(foot);
  return card;
}

// ── ACTIONS ──────────────────────────────────────────────────────
function updateStatus(id, status) {
  if (!BACKEND_URL) return;
  fetch(BACKEND_URL + '/order/' + id + '/status', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({status: status})
  });
}

function deleteOrder(id) {
  if (!BACKEND_URL) return;
  fetch(BACKEND_URL + '/order/' + id, {method:'DELETE'});
}

// ── STATS ────────────────────────────────────────────────────────
function updateStats() {
  var active = 0, preparing = 0, ready = 0, revenue = 0;
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    if (o.status !== 'done') active++;
    if (o.status === 'preparing') preparing++;
    if (o.status === 'ready') ready++;
    for (var j = 0; j < o.items.length; j++) {
      revenue += o.items[j].price * o.items[j].qty;
    }
  }
  document.getElementById('statTotal').textContent = orders.length;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statPreparing').textContent = preparing;
  document.getElementById('statReady').textContent = ready;
  document.getElementById('statRevenue').textContent = revenue.toLocaleString('tr-TR') + ' TL';
}

// ── SOUND ────────────────────────────────────────────────────────
function playAlert() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(freq, start, dur) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + start + 0.01);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    }
    beep(880, 0, 0.12);
    beep(1100, 0.15, 0.12);
    beep(1320, 0.30, 0.20);
  } catch(e) {}
}

// ── TOAST ────────────────────────────────────────────────────────
function showToast(order) {
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast';
  var title = document.createElement('div');
  title.className = 'toast-title';
  title.textContent = 'YENI SIPARIS #' + String(order.id).padStart(3,'0');
  toast.appendChild(title);
  var body = document.createElement('div');
  body.className = 'toast-body';
  body.textContent = (order.orderType === 'dinein' ? 'Masa ' + order.table : 'Paket Servis') + ' - ' + order.items.length + ' kalem';
  toast.appendChild(body);
  container.appendChild(toast);
  setTimeout(function() {
    if (toast.parentNode) toast.parentNode.removeChild(toast);
  }, 5000);
}
</script>
